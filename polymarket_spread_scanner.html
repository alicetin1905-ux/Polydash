<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Polymarket Spread Scanner</title>

<style>
body {
    font-family: Arial;
    background: #0f0f0f;
    color: #e6e6e6;
    margin: 20px;
}

h1 { color: #00d084; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #333;
    padding: 8px;
    font-size: 14px;
}

th { background: #1c1c1c; }

button {
    padding: 5px 10px;
    cursor: pointer;
}

.card {
    background: #1a1a1a;
    padding: 10px;
    margin-bottom: 10px;
}
.green { color: #00d084; }
.red { color: #ff5c5c; }
</style>
</head>

<body>

<h1>Polymarket Spread Scanner</h1>

<div class="card">
    Spread Threshold:
    <input id="threshold" type="number" step="0.01" value="0.05">
    <button onclick="scan()">Scan</button>
</div>

<div class="card">
    <b>Realized PnL:</b> <span id="pnl">0</span><br>
    <b>Open Positions:</b> <span id="open">0</span>
</div>

<table>
<thead>
<tr>
<th>Market</th>
<th>Bid</th>
<th>Ask</th>
<th>Spread</th>
<th>Action</th>
</tr>
</thead>
<tbody id="rows"></tbody>
</table>

<h2>Positions</h2>
<table>
<thead>
<tr>
<th>Market</th>
<th>Entry</th>
<th>Current Bid</th>
<th>PnL</th>
<th>Close</th>
</tr>
</thead>
<tbody id="pos"></tbody>
</table>

<script>

let positions =
JSON.parse(localStorage.getItem("pos") || "[]");

let pnl =
parseFloat(localStorage.getItem("pnl") || "0");

function save(){
    localStorage.setItem("pos", JSON.stringify(positions));
    localStorage.setItem("pnl", pnl);
}

function render(){
    document.getElementById("open").innerText = positions.length;
    document.getElementById("pnl").innerText = pnl.toFixed(2);

    const body = document.getElementById("pos");
    body.innerHTML = "";

    positions.forEach((p,i)=>{
        let cur = p.currentBid;
        let profit = cur - p.entry;

        body.innerHTML += `
        <tr>
            <td>${p.market}</td>
            <td>${p.entry.toFixed(2)}</td>
            <td>${cur.toFixed(2)}</td>
            <td class="${profit>=0?'green':'red'}">
                ${profit.toFixed(2)}
            </td>
            <td><button onclick="closePos(${i})">Close</button></td>
        </tr>`;
    });
}

function openPos(m, ask, bid){
    positions.push({
        market:m,
        entry:ask,
        currentBid:bid
    });
    save();
    render();
}

function closePos(i){
    let p = positions[i];
    pnl += (p.currentBid - p.entry);
    positions.splice(i,1);
    save();
    render();
}

async function fetchMarkets(){

    const API =
    "https://clob.polymarket.com/markets";

    const PROXY =
    "https://api.allorigins.win/raw?url=";

    try {
        let r = await fetch(API);
        if(!r.ok) throw "direct fail";
        return await r.json();
    } catch(e) {
        try {
            let r = await fetch(PROXY + encodeURIComponent(API));
            return await r.json();
        } catch(e2) {
            return null;
        }
    }
}

function mock(){
    return [
        {question:"BTC > 200k", bestBid:0.42, bestAsk:0.51},
        {question:"ETH > 10k", bestBid:0.30, bestAsk:0.36},
        {question:"Fed cuts rates", bestBid:0.55, bestAsk:0.64},
        {question:"AI bubble bursts", bestBid:0.48, bestAsk:0.60}
    ];
}

async function scan(){

    const threshold =
    parseFloat(document.getElementById("threshold").value);

    let markets =
    await fetchMarkets();

    if(!markets || !Array.isArray(markets)){
        markets = mock();
    }

    let results = [];

    for(let m of markets){

        let bid = Number(m.bestBid || 0);
        let ask = Number(m.bestAsk || 0);

        if(!bid || !ask) continue;

        let spread = ask - bid;

        if(spread >= threshold){
            results.push({
                name:m.question,
                bid,
                ask,
                spread
            });
        }
    }

    results.sort((a,b)=>b.spread-a.spread);

    const body =
    document.getElementById("rows");

    body.innerHTML = "";

    results.forEach(r=>{
        body.innerHTML += `
        <tr>
            <td>${r.name}</td>
            <td>${r.bid.toFixed(2)}</td>
            <td>${r.ask.toFixed(2)}</td>
            <td>${r.spread.toFixed(2)}</td>
            <td>
                <button onclick="
                    openPos(
                        '${r.name}',
                        ${r.ask},
                        ${r.bid}
                    )
                ">Paper Buy</button>
            </td>
        </tr>`;
    });

    // update positions live
    results.forEach(r=>{
        let p = positions.find(x=>x.market===r.name);
        if(p) p.currentBid = r.bid;
    });

    save();
    render();
}

scan();
setInterval(scan, 8000);

</script>

</body>
</html>
