<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polymarket Paper Trader</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#eee;
    margin:20px;
}
h1{
    color:#4caf50;
}
.card{
    background:#1c1c1c;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}
.metric{
    font-size:24px;
    font-weight:bold;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #333;
    padding:8px;
    text-align:left;
}
th{
    background:#222;
}
.green{
    color:#4caf50;
}
.red{
    color:#f44336;
}
button{
    padding:10px;
    cursor:pointer;
}
.small{
    font-size:12px;
}
</style>
</head>
<body>

<h1>Polymarket Paper Trader</h1>

<div class="card grid">
    <div>
        Cash
        <div id="cash" class="metric">$1000</div>
    </div>
    <div>
        Equity
        <div id="equity" class="metric">$1000</div>
    </div>
    <div>
        Open Positions
        <div id="positionsCount" class="metric">0</div>
    </div>
    <div>
        Win Rate
        <div id="winRate" class="metric">0%</div>
    </div>
</div>

<div class="card">
    <button onclick="refreshMarkets()">Refresh Now</button>
    <button onclick="resetPortfolio()">Reset Portfolio</button>
    <span class="small">Auto refresh every 60 sec</span>
</div>

<div class="card">
    <h2>Open Positions</h2>
    <table>
        <thead>
        <tr>
            <th>Market</th>
            <th>Entry</th>
            <th>Current</th>
            <th>Size</th>
            <th>P&L</th>
        </tr>
        </thead>
        <tbody id="positionsTable"></tbody>
    </table>
</div>

<div class="card">
    <h2>Trade History</h2>
    <table>
        <thead>
        <tr>
            <th>Time</th>
            <th>Action</th>
            <th>Market</th>
            <th>P&L</th>
        </tr>
        </thead>
        <tbody id="tradesTable"></tbody>
    </table>
</div>

<div class="card">
    <h2>Top Markets</h2>
    <table>
        <thead>
        <tr>
            <th>Question</th>
            <th>Prob</th>
            <th>Signal</th>
        </tr>
        </thead>
        <tbody id="marketsTable"></tbody>
    </table>
</div>

<script>

const CONFIG = {
    STARTING_CASH: 1000,
    POSITION_SIZE: 0.05,
    MAX_MARKETS: 50,
    REFRESH_MS: 60000,
    BUY_THRESHOLD: 0.03,
    SELL_THRESHOLD: -0.01
};

let portfolio = loadPortfolio();

function loadPortfolio(){
    const saved = localStorage.getItem("paperPortfolio");
    if(saved) return JSON.parse(saved);

    return {
        cash: CONFIG.STARTING_CASH,
        positions: [],
        trades: [],
        equityHistory: []
    };
}

function savePortfolio(){
    localStorage.setItem(
        "paperPortfolio",
        JSON.stringify(portfolio)
    );
}

function resetPortfolio(){
    localStorage.removeItem("paperPortfolio");
    location.reload();
}

async function fetchMarkets(){

    try{

        const res = await fetch(
            "https://gamma-api.polymarket.com/markets"
        );

        const data = await res.json();

        return data
            .filter(m => m.active)
            .slice(0, CONFIG.MAX_MARKETS);

    }catch(e){

        console.error(e);

        return [];
    }
}

function getProbability(market){

    if(market.lastTradePrice !== undefined)
        return Number(market.lastTradePrice);

    if(market.outcomePrices &&
       market.outcomePrices.length)
        return Number(market.outcomePrices[0]);

    return Math.random();
}

function generateSignal(market){

    const p = getProbability(market);

    const momentum =
        (Math.random() - 0.5) * 0.10;

    return momentum;
}

function buyPosition(market){

    const size =
        portfolio.cash *
        CONFIG.POSITION_SIZE;

    if(size < 5) return;

    portfolio.cash -= size;

    portfolio.positions.push({
        id: market.id,
        question: market.question,
        entryPrice: getProbability(market),
        currentPrice: getProbability(market),
        size,
        opened: Date.now()
    });

    portfolio.trades.unshift({
        action:"BUY",
        question:market.question,
        pnl:0,
        time:new Date().toLocaleString()
    });
}

function closePosition(pos){

    const pnl =
        ((pos.currentPrice -
          pos.entryPrice)
          * pos.size);

    portfolio.cash +=
        pos.size + pnl;

    portfolio.trades.unshift({
        action:"SELL",
        question:pos.question,
        pnl:pnl.toFixed(2),
        time:new Date().toLocaleString()
    });

    portfolio.positions =
        portfolio.positions.filter(
            p => p !== pos
        );
}

function updatePositions(markets){

    for(const pos of portfolio.positions){

        const market = markets.find(
            m => m.id == pos.id
        );

        if(!market) continue;

        pos.currentPrice =
            getProbability(market);

        const signal =
            generateSignal(market);

        if(signal <
           CONFIG.SELL_THRESHOLD){

            closePosition(pos);
        }
    }
}

function evaluateMarkets(markets){

    markets.forEach(market => {

        const signal =
            generateSignal(market);

        const already =
            portfolio.positions.some(
                p => p.id == market.id
            );

        if(signal >
           CONFIG.BUY_THRESHOLD &&
           !already){

            buyPosition(market);
        }
    });
}

function calculateEquity(){

    let equity =
        portfolio.cash;

    portfolio.positions.forEach(p => {

        const pnl =
            (p.currentPrice -
             p.entryPrice)
             * p.size;

        equity +=
            p.size + pnl;
    });

    return equity;
}

function render(markets){

    const equity =
        calculateEquity();

    document.getElementById(
        "cash"
    ).innerText =
        "$" +
        portfolio.cash.toFixed(2);

    document.getElementById(
        "equity"
    ).innerText =
        "$" +
        equity.toFixed(2);

    document.getElementById(
        "positionsCount"
    ).innerText =
        portfolio.positions.length;

    const sells =
        portfolio.trades.filter(
            t => t.action==="SELL"
        );

    const wins =
        sells.filter(
            t => Number(t.pnl)>0
        );

    const winRate =
        sells.length
        ? (wins.length /
           sells.length *100)
        : 0;

    document.getElementById(
        "winRate"
    ).innerText =
        winRate.toFixed(1)+"%";

    document.getElementById(
        "positionsTable"
    ).innerHTML =
        portfolio.positions.map(p => {

            const pnl =
                ((p.currentPrice -
                  p.entryPrice)
                  * p.size);

            return `
            <tr>
                <td>${p.question}</td>
                <td>${p.entryPrice.toFixed(3)}</td>
                <td>${p.currentPrice.toFixed(3)}</td>
                <td>$${p.size.toFixed(2)}</td>
                <td class="${
                    pnl>=0
                    ? 'green'
                    : 'red'
                }">
                $${pnl.toFixed(2)}
                </td>
            </tr>
            `;
        }).join("");

    document.getElementById(
        "tradesTable"
    ).innerHTML =
        portfolio.trades
        .slice(0,50)
        .map(t=>`
        <tr>
            <td>${t.time}</td>
            <td>${t.action}</td>
            <td>${t.question}</td>
            <td>$${t.pnl}</td>
        </tr>
        `).join("");

    document.getElementById(
        "marketsTable"
    ).innerHTML =
        markets.map(m => {

            const signal =
                generateSignal(m);

            return `
            <tr>
                <td>${m.question}</td>
                <td>
                ${getProbability(m)
                    .toFixed(3)}
                </td>
                <td class="${
                    signal>0
                    ? 'green'
                    : 'red'
                }">
                ${signal.toFixed(3)}
                </td>
            </tr>
            `;
        }).join("");
}

async function refreshMarkets(){

    const markets =
        await fetchMarkets();

    updatePositions(markets);

    evaluateMarkets(markets);

    savePortfolio();

    render(markets);
}

refreshMarkets();

setInterval(
    refreshMarkets,
    CONFIG.REFRESH_MS
);

</script>

</body>
</html>
